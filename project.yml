name: LEXIS
options:
  bundleIdPrefix: com.daviddefranceski
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
# Google Mobile Ads (AdMob) — rewarded, opt-in ads only. See LEXIS/GoogleAds.swift
# for the switch that keeps release builds ad-free until real AdMob IDs are set.
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
# Define the app scheme explicitly (and shared) so `xcodegen generate` always
# emits LEXIS as the primary run target. Without this, regenerating wipes
# schemes and Xcode auto-creates one per target — sometimes leaving the
# non-launchable LexisWidgetExtension selected, which fails with "failed to
# launch or exited before the debugger could attach".
schemes:
  LEXIS:
    build:
      targets:
        LEXIS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  LEXIS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LEXIS
    dependencies:
      - target: LexisWidgetExtension
        embed: true
      # One product only — it pulls in GoogleUserMessagingPlatform (the UMP
      # consent SDK) transitively, so `import UserMessagingPlatform` resolves.
      - package: GoogleMobileAds
        product: GoogleMobileAds
    entitlements:
      path: LEXIS/LEXIS.entitlements
      properties:
        com.apple.developer.game-center: true
        # iCloud key-value store, for CloudSync (progress backup/restore).
        # Requires the iCloud capability enabled on the App ID; -allowProvisioning-
        # Updates usually enables it automatically on the next device archive.
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        com.apple.security.application-groups:
          - group.com.daviddefranceski.lexis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddefranceski.lexis
        DEVELOPMENT_TEAM: L9SAXP2E2W
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: LEXIS
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "15"
        # The board is a tall portrait layout with no landscape support built
        # in, so rather than declaring all 4 orientations (which App Store
        # Connect otherwise requires for iPad multitasking), we opt out of
        # multitasking/rotation entirely via UIRequiresFullScreen.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        # LEXIS implements no encryption beyond what the OS provides for free
        # (HTTPS for Game Center, standard Keychain/UserDefaults) — declaring
        # this up front means App Store Connect stops asking the export
        # compliance question interactively on every single upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Shown in the App Tracking Transparency prompt. Ads ship live in 2.0,
        # so this is set for BOTH configs — and the privacy nutrition label MUST
        # declare Third-Party Advertising + the device identifier to match.
        INFOPLIST_KEY_NSUserTrackingUsageDescription: "LEXIS uses this to show you more relevant ads. You can play with non-personalized ads instead — your choice."
        # A PARTIAL plist holding only the keys GENERATE_INFOPLIST_FILE can't
        # emit (GADApplicationIdentifier, SKAdNetworkItems). Xcode MERGES the
        # generated INFOPLIST_KEY_* values into it, so both mechanisms coexist.
        INFOPLIST_FILE: LEXIS/Info.plist
        # >>> Your AdMob App ID (AdMob console → Apps → LEXIS → App settings).
        #     Referenced as $(GAD_APPLICATION_IDENTIFIER) from LEXIS/Info.plist.
        #     Currently Google's TEST app id — REPLACE before shipping ads.
        GAD_APPLICATION_IDENTIFIER: "ca-app-pub-3940256099942544~1458002511"

  # Home Screen widget showing the Daily Challenge streak and whether
  # today's puzzle is done. Reads the same App Group container the main app
  # writes to in DailyChallengeManager — a widget process can't see
  # UserDefaults.standard, so without the shared group it'd have nothing to
  # show.
  LexisWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LexisWidget
    entitlements:
      path: LexisWidget/LexisWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.daviddefranceski.lexis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddefranceski.lexis.widget
        DEVELOPMENT_TEAM: L9SAXP2E2W
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: LexisWidget/Info.plist
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "15"
        SKIP_INSTALL: YES
